# ──────────────────────────────────────────────
# Trading Universe
# ──────────────────────────────────────────────
symbols:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT
  - AVAX/USDT
  - LINK/USDT
  - POL/USDT
  - UNI/USDT
  - AAVE/USDT
  - LTC/USDT
  - NEAR/USDT

timeframe: "5m"

# ──────────────────────────────────────────────
# Portfolio
# ──────────────────────────────────────────────
initial_balance: 10000.0
trading_fee_pct: 0.001       # 0.1% taker fee
slippage_pct: 0.0005         # 0.05% slippage estimate

# ──────────────────────────────────────────────
# Data Engineering
# ──────────────────────────────────────────────
data:
  lookback_days: 365
  missing_candle_policy:
    ffill_limit: 3
    stale_flag_limit: 20
    segment_split_beyond: 20
  paths:
    raw: "data/01_raw"
    intermediate: "data/02_intermediate"
    features: "data/03_features"
    normalized: "data/04_normalized"
    splits: "data/05_splits"

# ──────────────────────────────────────────────
# Technical Indicators
# ──────────────────────────────────────────────
indicators:
  rsi_window: 14
  sma_window: 20
  ema_window: 20
  stochastic_window: 14
  macd:
    fast: 12
    slow: 26
    signal: 9
  roc_window: 10
  williams_r_window: 14
  disparity_sma_window: 20
  ad: true
  obv: true

# ──────────────────────────────────────────────
# Normalization
# ──────────────────────────────────────────────
normalization:
  method: "rolling_zscore"
  window: 500

# ──────────────────────────────────────────────
# Train / Test Split
# ──────────────────────────────────────────────
split:
  test_ratio: 0.2
  n_cv_folds: 5

# ──────────────────────────────────────────────
# TD3 Hyperparameters
# ──────────────────────────────────────────────
# EXP-011 CHANGE — escalate to the POLICY/ALGORITHM branch (pre-registered in EXP-010 as the
# kill-(a) escalation target). The ONE change vs the EXP-010 base is the network capacity:
#   td3.net_arch.pi  [256, 128] -> [400, 300]
#   td3.net_arch.qf  [256, 128] -> [400, 300]
# (Everything else — scaled allocation, rebalance_threshold 0.10, turnover_penalty_coef 0.001,
#  cross_sectional_momentum true @ momentum_window 48 — is carried UNCHANGED from EXP-010.
#  We KEEP the momentum observation on: it is a fresh structural feature, it does no harm at
#  the converged near-cash optimum, and if added capacity ever lets the actor exploit relative
#  strength we want that channel available. The capacity change is the single experimental var.)
#
# WHY THIS, WHY NOW — the pre-registered escalation from EXP-010 fired (not a guess):
#   EXP-010 turned cross_sectional_momentum ON at a TREND horizon (momentum_window 48 = ~4h) on
#   the scaled base, to test whether a relative-strength signal would give the edge-less actor a
#   REASON to deploy capital selectively. The pre-registered ADOPT path required all three of:
#   (i) cash_ratio_mean < 0.85, (ii) per-asset trade HHI well above 0.10 (winner concentration),
#   (iii) Sharpe gain reproducing across BOTH seeds. NONE held. From MLflow (fold_1 perf
#   snapshots, paired across the scaled line):
#     cash_ratio_mean      0.904 / 0.887   (both > 0.85  -> still ~89% cash)
#     perf/n_trades        13 / 12         (single-to-low-double digit, EXP-009 was 12/9)
#     per-asset trade HHI  0.1124 / 0.1168 (uniform 1/10 = 0.1000 -> NO concentration on winners)
#     total_cost           39.2 / 37.8     (vs champion chain ~960; participation barely moved)
#     actions/mean         oscillates in [-0.05, +0.06] from step 10k through 200k in BOTH seeds
#                          (identical converged near-cash attractor to EXP-008/009; NOT drifting)
#     critic_loss          -> 0.0000 by ~105k in both seeds (converged, NOT undertrained)
#   The headline mean Sharpe +2.92 is again a money-market artifact: profit_factor 18.9/26.6 and
#   win_rate 0.83/0.85 computed on 12-13 trades of a near-cash book; the S123/F1 -2.67 outlier is
#   ONE adverse move (reward_skewness -40.05, reward_kurtosis 2884) on a tiny undiversified
#   position the down-market fold could not absorb -- the SAME single-adverse-move pattern as
#   EXP-009's S123/F1 -3.46. EXP-010 kill-(a) NO-LIFT FIRED: cash > 0.85, single-digit-class
#   trades, HHI ~0.10 -> even a trend-horizon cross-sectional signal does not move the agent off
#   the near-cash floor. DIRECT comparison to EXP-006 (momentum @ window 12 on the RENORMALIZE
#   base): HHI there was 0.109 / 0.112 -- the SAME uniform spread. So across BOTH momentum
#   variants (12-bar/renormalize AND 48-bar/scaled) the cross-sectional feature produced zero
#   winner concentration. The observation is correctly wired (params logged csm=True window=48;
#   the obs vector IS extended; the actor simply declines to use it) -> the OBSERVATION is not
#   the bottleneck. -> escalate to the POLICY/ALGORITHM branch exactly as pre-registered.
#
# WHY net_arch FIRST, AND NOT SAC:
#   The chain has now ruled out, with converged evidence, every cheaper lever: cost shaping
#   (EXP-002..005, exhausted), training length (EXP-007: 400k hardens long-bias, does not
#   converge differently), the cash mechanic (EXP-008: scaled works mechanically), the penalty
#   (EXP-009: non-binding), and signal/observation content (EXP-006 + EXP-010: no concentration
#   on either horizon/base). What remains on the policy branch is (1) representation capacity and
#   (2) algorithm class. net_arch is the CHEAPER, no-code, single-config probe of (1): the actor
#   converges to ~0 (cash) -- one open question is whether a [256,128] MLP simply lacks the
#   capacity to map the 13-feature-per-asset observation (12 TIs + cross-sectional momentum) into
#   a selective allocation, collapsing to the trivial cash policy as the only thing it can
#   represent. [400,300] is the canonical larger TD3/DDPG actor-critic width (Fujimoto et al.
#   2018 used exactly [400,300]); it roughly doubles parameter count without touching the
#   algorithm, optimizer, or any code path. SAC is the (2) probe but REQUIRES CODE (see note
#   below) and is the more expensive, higher-variance swap -- it is the correct NEXT step only
#   after capacity is ruled out cheaply here. One change, cheapest-first.
#
#   Hypothesis: if the near-cash collapse is a representation-capacity bottleneck, a wider actor
#   gives the policy enough capacity to express a selective, momentum-conditioned allocation ->
#   cash_ratio_mean falls below ~0.85, n_trades rises into the tens-to-low-hundreds CONCENTRATED
#   on high-momentum assets (HHI >> 0.10), and that selective exposure carries a positive Sharpe
#   reproducing across BOTH seeds. If capacity is NOT the bottleneck (most likely, given the
#   clean converged critic and the edge-less win-rate evidence across the whole chain), the agent
#   stays at the same near-cash attractor -> the representation lever is exhausted -> the only
#   remaining policy-branch move is the algorithm swap (SAC), OR the harder conclusion that no
#   tradable directional edge exists in this 10-asset 5m universe with these features.
#
#   Watch (same diagnostics as EXP-010, judged against the SAME pre-registered bar):
#     per-asset trade HHI  (target: >> 0.10 = concentration on winners; EXP-010 was 0.11/0.12)
#     perf/cash_ratio_mean (target: materially < 0.85; EXP-010 was 0.90/0.89)
#     perf/n_trades        (target: tens-to-low-hundreds, NOT 12-13 and NOT thousands)
#     actions/mean trajectory (target: actor settles AWAY from ~0, i.e. deploys; EXP-010 pinned ~0)
#     win_rate / profit_factor on a MEANINGFUL trade count (target: off the 0.5 coin-flip)
#     fold_1 Sharpe/MaxDD and the S123/F1 outlier (does a real book survive the down-market, or
#                          is it again one adverse move on a tiny position?)
#
#   GUARD / KILL CRITERION (two-sided, mirrors EXP-009/010):
#     (a) NO-LIFT: if cash_ratio_mean stays > 0.85 and n_trades stays single-to-low-double-digit
#         AND per-asset HHI ~0.10 (uniform) -> added actor capacity does not change the policy ->
#         REJECT. Representation capacity is NOT the bottleneck. -> escalate to the ALGORITHM
#         swap (SAC, code required -- specified in the proposal), OR formally conclude the
#         feature/universe carries no tradable edge and stop the policy-branch search.
#     (b) CHURN-NO-EDGE: if the wider net makes the agent participate (cash_ratio_mean < 0.85,
#         n_trades in the hundreds) but trades stay UNCONCENTRATED (HHI ~0.10) and Sharpe is
#         negative with total_cost climbing back toward ~960 -> capacity bought churn, not edge
#         -> REJECT; the bottleneck is signal predictiveness, not policy class -> reconsider the
#         feature set, not more capacity.
#   ADOPT path: cash_ratio_mean < 0.85 AND HHI well above 0.10 (winner concentration) AND mean
#     Sharpe beats the active scaled line with the gain reproducible across BOTH seeds (not one
#     lucky fold_0) -> the FIRST genuine selective-trading edge in the chain -> ADOPT + queue a
#     1M-step / 5-seed / all-folds confirmation run before building anything further on it.
#
#   NOTE on comparison base: net_arch changes the policy network ONLY; data, obs dimensionality,
#   execution semantics, seeds and folds are identical to EXP-010 -> this IS paired with EXP-010
#   on every axis except the single capacity change (cleaner pairing than the last three
#   structural baselines). Compare on the headline metric against the active scaled line
#   (EXP-010 +2.92, itself a near-cash artifact) but JUDGE primarily by the PARTICIPATION +
#   CONCENTRATION diagnostics above, not the raw Sharpe. data_fingerprint must remain
#   ec2e07548f555da2.
td3:
  # Decoupled learning rates
  learning_rate:
    actor: 0.0001
    critic: 0.0003

  # Crucial for stable convergence in crypto
  lr_schedule: "linear" # or "cosine"

  gamma: 0.99
  tau: 0.005
  batch_size: 512
  buffer_size: 100000
  learning_starts: 10000
  train_freq: 4
  policy_delay: 2
  target_noise_clip: 0.5
  target_policy_noise: 0.2
  action_noise_std: 0.1
  total_timesteps: 200000   # standard screening budget (unchanged)
  # THE ONE CHANGE (vs EXP-010): widen both actor and critic MLP capacity.
  net_arch:
    pi: [400, 300]   # was [256, 128] — canonical larger TD3/DDPG actor width (Fujimoto et al. 2018)
    qf: [400, 300]   # was [256, 128]

# ──────────────────────────────────────────────
# Environment
# ──────────────────────────────────────────────
# All environment settings carried UNCHANGED from EXP-010 (scaled structural line + momentum on).
environment:
  window_size: 50
  reward_scaling: 1.0
  max_position: 1.0
  rebalance_threshold: 0.10
  turnover_penalty_coef: 0.001
  cross_sectional_momentum: true   # kept ON from EXP-010 (signal channel stays available)
  momentum_window: 48              # kept at ~4h trend horizon from EXP-010
  allocation_mode: "scaled"        # retained cash-enabling mechanic (EXP-008..010)

# ──────────────────────────────────────────────
# Training
# ──────────────────────────────────────────────
training:
  seeds: [42, 123]
  cv_train_months: 2
  cv_validation_months: 1
  model_dir: "models"
  mlflow_experiment_name: "td3_crypto_trading"
  mlflow_tracking_uri: "mlruns"
  progress_log_every_steps: 10000
  max_folds: 2

# ──────────────────────────────────────────────
# Backtesting
# ──────────────────────────────────────────────
backtesting:
  benchmark: "BTC/USDT"

# ──────────────────────────────────────────────
# Deployment
# ──────────────────────────────────────────────
deployment:
  poll_interval_seconds: 300   # 5m candle
  model_path: "models/td3_best.zip"
