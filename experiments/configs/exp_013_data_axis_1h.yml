# ============================================================================
# EXP-013 — DATA AXIS PIVOT: 1h baseline (champion EXP-007 config re-based at 1h)
# ============================================================================
# FRESH 1h EXPERIMENT CHAIN. The 1h fetch regenerates all parquet artifacts and
# produces a NEW data_fingerprint, so this is NOT paired with EXP-001..012 (which
# were all at 5m). EXP-013 is the in-fingerprint 1h BASELINE; the 1h chain builds
# on it.
#
# DESIGN (strategist consultation, Option 1): the baseline carries the TRUE champion
# EXP-007 environment block — renormalize allocation (forced ~full investment),
# no-trade band 0.10, turnover_penalty 0.004, momentum OFF, TD3 — at the 200k
# SCREENING budget (NOT EXP-007's 400k; mirrors how EXP-008 re-based at 200k).
# The single experimental variable vs champion EXP-007 is timeframe: 5m -> 1h.
#
# WHY renormalize (not the scaled+momentum line): a baseline must be a clean,
# unconfounded reference. renormalize CANNOT hold cash, so its 1h val Sharpe is an
# honest readout of "does a fully-invested agent find a directional edge at 1h" —
# the exact question the data-axis pivot exists to answer. At 1h the per-unit-time
# cost drag (which ruined renormalize at 5m, EXP-001..007) is ~12x lower, so this is
# a genuinely different experiment from the 5m renormalize runs. The scaled cash
# mechanic returns as EXP-014, judged cleanly against a 1h baseline that trades.
#
# FOLD ANALYSIS: calendar-based folds are timeframe-invariant -> 7 folds available
# (same as 5m); screening uses first 2. Per-fold ~1489 train / ~721 val candles at
# 1h (vs ~17.5k/8.5k at 5m) -> 4-datapoint screening readout is noisier; apply the
# 0.05 threshold and "promising -> confirm at bigger budget" rule with extra caution.
# ============================================================================

# ── Trading Universe (UNCHANGED — never touched) ──
symbols:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT
  - AVAX/USDT
  - LINK/USDT
  - POL/USDT
  - UNI/USDT
  - AAVE/USDT
  - LTC/USDT
  - NEAR/USDT

timeframe: "1h"                # THE ONE CHANGE vs champion EXP-007 (was 5m)

# ── Portfolio (UNCHANGED) ──
initial_balance: 10000.0
trading_fee_pct: 0.001
slippage_pct: 0.0005

# ── Data Engineering (UNCHANGED span, coarser bars) ──
data:
  lookback_days: 365
  missing_candle_policy:
    ffill_limit: 3
    stale_flag_limit: 20
    segment_split_beyond: 20
  paths:
    raw: "data/01_raw"
    intermediate: "data/02_intermediate"
    features: "data/03_features"
    normalized: "data/04_normalized"
    splits: "data/05_splits"

# ── Technical Indicators (UNCHANGED windows, now in 1h bars) ──
indicators:
  rsi_window: 14
  sma_window: 20
  ema_window: 20
  stochastic_window: 14
  macd:
    fast: 12
    slow: 26
    signal: 9
  roc_window: 10
  williams_r_window: 14
  disparity_sma_window: 20
  ad: true
  obv: true

# ── Normalization (UNCHANGED; 500 bars = ~3 weeks at 1h — revisit as later lever) ──
normalization:
  method: "rolling_zscore"
  window: 500

# ── Train / Test Split ──
split:
  test_ratio: 0.2
  n_cv_folds: 5

# ── TD3 / Algorithm (champion EXP-007 hyperparameters; SAC reverted — no benefit, 8x slower) ──
td3:
  algorithm: "td3"
  learning_rate:
    actor: 0.0001
    critic: 0.0003
  lr_schedule: "linear"
  gamma: 0.99
  tau: 0.005
  batch_size: 512
  buffer_size: 100000
  learning_starts: 10000
  train_freq: 4
  policy_delay: 2
  target_noise_clip: 0.5
  target_policy_noise: 0.2
  action_noise_std: 0.1
  total_timesteps: 200000      # screening budget (NOT EXP-007's 400k)
  net_arch:
    pi: [256, 128]
    qf: [256, 128]

# ── Environment — TRUE champion EXP-007 block (renormalize, momentum OFF) ──
environment:
  window_size: 50              # 50 bars = ~2 days at 1h
  reward_scaling: 1.0
  max_position: 1.0
  rebalance_threshold: 0.10    # champion no-trade band
  turnover_penalty_coef: 0.004 # champion penalty
  cross_sectional_momentum: false   # champion: momentum OFF
  momentum_window: 12          # inert while csm=false
  allocation_mode: "renormalize"    # champion: forced ~full investment (clean edge probe)

# ── Training ──
training:
  seeds: [42, 123]
  cv_train_months: 2
  cv_validation_months: 1
  model_dir: "models"
  mlflow_experiment_name: "td3_crypto_trading"
  mlflow_tracking_uri: "mlruns"
  progress_log_every_steps: 10000
  max_folds: 2

# ── Backtesting ──
backtesting:
  benchmark: "BTC/USDT"

# ── Deployment ──
deployment:
  poll_interval_seconds: 3600  # 1h candle
  model_path: "models/td3_best.zip"
