# ──────────────────────────────────────────────
# Trading Universe
# ──────────────────────────────────────────────
symbols:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT
  - AVAX/USDT
  - LINK/USDT
  - POL/USDT
  - UNI/USDT
  - AAVE/USDT
  - LTC/USDT
  - NEAR/USDT

timeframe: "5m"

# ──────────────────────────────────────────────
# Portfolio
# ──────────────────────────────────────────────
initial_balance: 10000.0
trading_fee_pct: 0.001       # 0.1% taker fee
slippage_pct: 0.0005         # 0.05% slippage estimate

# ──────────────────────────────────────────────
# Data Engineering
# ──────────────────────────────────────────────
data:
  lookback_days: 365
  missing_candle_policy:
    ffill_limit: 3
    stale_flag_limit: 20
    segment_split_beyond: 20
  paths:
    raw: "data/01_raw"
    intermediate: "data/02_intermediate"
    features: "data/03_features"
    normalized: "data/04_normalized"
    splits: "data/05_splits"

# ──────────────────────────────────────────────
# Technical Indicators
# ──────────────────────────────────────────────
indicators:
  rsi_window: 14
  sma_window: 20
  ema_window: 20
  stochastic_window: 14
  macd:
    fast: 12
    slow: 26
    signal: 9
  roc_window: 10
  williams_r_window: 14
  disparity_sma_window: 20
  ad: true
  obv: true

# ──────────────────────────────────────────────
# Normalization
# ──────────────────────────────────────────────
normalization:
  method: "rolling_zscore"
  window: 500

# ──────────────────────────────────────────────
# Train / Test Split
# ──────────────────────────────────────────────
split:
  test_ratio: 0.2
  n_cv_folds: 5

# ──────────────────────────────────────────────
# TD3 Hyperparameters
# ──────────────────────────────────────────────
td3:
  # Decoupled learning rates
  learning_rate:
    actor: 0.0001
    critic: 0.0003

  # Crucial for stable convergence in crypto
  lr_schedule: "linear" # or "cosine"

  gamma: 0.99
  tau: 0.005
  batch_size: 512
  buffer_size: 100000
  learning_starts: 10000
  train_freq: 4
  policy_delay: 2
  target_noise_clip: 0.5
  target_policy_noise: 0.2
  action_noise_std: 0.1

  # EXP-007 CHANGE — longer training: total_timesteps 200000 -> 400000
  # (base = champion EXP-005; cost levers frozen, momentum OFF as in champion).
  #
  # WHY THIS, WHY NOW (evidence from EXP-006 diagnostics, not a guess):
  #  - At the 200k screening cutoff the policy is PROVABLY NOT CONVERGED. Over the last
  #    40k steps of BOTH EXP-006 seeds, actions/mean is still climbing monotonically
  #    (s42 0.572 -> 0.639, s123 0.583 -> 0.645) and actions/std is still falling
  #    (s42 0.739 -> 0.689, s123 0.735 -> 0.687). The actor is still drifting toward
  #    larger long positions at the moment we stop training — it has not settled.
  #  - buffer/reward_mean is likewise still creeping toward zero at 200k (s42
  #    -6.2e-5 -> -5.9e-5, s123 -4.9e-5 -> -4.7e-5), not flat.
  #  - critic_loss is clean and converged (~2-5e-6), so this is NOT an instability /
  #    LR problem — it is simply insufficient optimisation time for the actor.
  #  - EXP-006 also showed exploded seed variance (std_val_sharpe 0.53 vs EXP-005's
  #    0.41; S42/F0 -1.51 vs S123/F0 -0.16). Under-converged actors land in different
  #    basins per seed -> that variance is consistent with "stopped too early", and
  #    longer training is the first-order fix to test.
  #
  # WHY MOMENTUM IS OFF (disentanglement, one-change discipline):
  #  EXP-006 added the cross-sectional momentum feature and was REJECTED (mean val
  #  Sharpe -1.33 vs champion -1.12). Critically, it did NOT change behaviour the way
  #  hypothesised: trade concentration stayed essentially uniform (per-asset trade HHI
  #  ~0.11 == 1/10 uniform, unchanged vs EXP-005 ~0.105-0.110), and win_rate /
  #  profit_factor moved only within noise (fold_1 win_rate 0.41-0.47, PF 0.59-0.62).
  #  So we have TWO open hypotheses for EXP-006's failure: (A) the chain is simply
  #  undertrained at 200k, or (B) the signal feature is useless / the bottleneck is the
  #  policy/algorithm. We cannot test "momentum + longer training" in one experiment
  #  (that is two changes vs champion). So EXP-007 isolates variable (A) ON THE CHAMPION
  #  observation: does doubling training time alone move the champion? This is the clean
  #  single-change pivot and it gates the whole branch:
  #    - If 400k helps the champion meaningfully -> the chain was undertrained; EXP-008
  #      becomes "momentum ON + 400k" (re-test the signal branch with adequate budget).
  #    - If 400k does NOT help -> 200k was already enough, EXP-006's rejection was real,
  #      and the bottleneck is signal/representation/algorithm (net_arch or SAC), NOT time.
  #
  # COST / FAIRNESS NOTE: total_timesteps is normally the fixed screening budget. Here it
  # IS the experimental variable, so EXP-007 is NOT paired with EXP-001..006 on the
  # training-length axis (longer optimisation = different model). It is compared to champion
  # EXP-005 on the headline metric only, same seeds [42,123], same 2 folds, same data
  # (data_fingerprint ec2e07548f555da2). Expect ~2x wall-clock (~38 min/fold on M1 Pro MPS,
  # ~2h30 total for 2 seeds x 2 folds) — flagged for the orchestrator.
  total_timesteps: 400000   # screening budget DOUBLED (this is the experimental change)
  net_arch:
    pi: [256, 128]
    qf: [256, 128]

# ──────────────────────────────────────────────
# Environment
# ──────────────────────────────────────────────
environment:
  window_size: 50
  reward_scaling: 1.0
  max_position: 1.0
  # Carried over from champion EXP-005 (cost levers + observation, ALL UNCHANGED).
  rebalance_threshold: 0.10
  turnover_penalty_coef: 0.004
  cross_sectional_momentum: false  # champion observation (momentum branch deferred to EXP-008)
  momentum_window: 12

# ──────────────────────────────────────────────
# Training
# ──────────────────────────────────────────────
training:
  seeds: [42, 123]
  cv_train_months: 2
  cv_validation_months: 1
  model_dir: "models"
  mlflow_experiment_name: "td3_crypto_trading"
  mlflow_tracking_uri: "mlruns"
  progress_log_every_steps: 10000
  max_folds: 2

# ──────────────────────────────────────────────
# Backtesting
# ──────────────────────────────────────────────
backtesting:
  benchmark: "BTC/USDT"

# ──────────────────────────────────────────────
# Deployment
# ──────────────────────────────────────────────
deployment:
  poll_interval_seconds: 300   # 5m candle
  model_path: "models/td3_best.zip"
